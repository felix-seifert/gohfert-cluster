apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: docs-ingress
  namespace: docs-ns
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: gohfert-ca-issuer
spec:
  tls:
    - hosts:
        - docs.gohfert.com
      secretName: docs-tls
  rules:
    - host: docs.gohfert.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: docs-service
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: docs-ingress-redirect
  namespace: docs-ns
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: docs-ns-redirect-https@kubernetescrd
spec:
  rules:
    - host: docs.gohfert.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: docs-service
                port:
                  number: 80
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-https
  namespace: docs-ns
spec:
  redirectScheme:
    scheme: https
    permanent: true
