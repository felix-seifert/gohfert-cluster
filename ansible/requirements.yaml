---
roles:
  # For setting up PostgreSQL database
  - name: geerlingguy.postgresql
    version: "4.0.4"

  # For installing self-hosted GitHub Actions runner
  - name: monolithprojects.github_actions_runner
    version: 5437d7e240c92fe0585c70a8a0a0981904d5a7ba # 1.28.0
    src: https://github.com/MonolithProjects/ansible-github_actions_runner

  # For installing kubectl
  - name: githubixx.kubectl
    src: https://github.com/githubixx/ansible-role-kubectl.git
    version: 45473959052c83b81f2a852306407c4222e47d0d # 26.0.0+1.35.1

collections:
  # For postgresql_user and postgresql_db (called by geerlingguy.postgresql)
  # which do not live in community.general anymore
  - name: community.postgresql
    version: 4.2.0

  # For deploying K3s cluster
  - name: https://github.com/timothystewart6/k3s-ansible
    type: git
    version: 668d7fb896c226cde2960491a60b917db8a4bf7e # 1.30.2

  # Needed for timothystewart6/k3s-ansible
  - name: ansible.utils
    version: 6.0.2
  - name: community.general
    version: 12.6.1
  - name: ansible.posix
    version: 2.1.0
  - name: kubernetes.core
    version: 6.4.0
